<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Teste Bot Java Joe's</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111b21; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .phone { width: 380px; height: 700px; background: #0b141a; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .header { background: #202c33; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 40px; height: 40px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .info h3 { color: #e9edef; font-size: 15px; }
    .info p { color: #8696a0; font-size: 12px; }
    .reset-btn { margin-left: auto; background: #2a3942; border: none; color: #8696a0; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .reset-btn:hover { background: #374248; color: #e9edef; }
    .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
    .msg.bot { background: #202c33; color: #e9edef; align-self: flex-start; border-radius: 0 10px 10px 10px; }
    .msg.user { background: #005c4b; color: #e9edef; align-self: flex-end; border-radius: 10px 0 10px 10px; }
    .msg.system { background: #1f2c34; color: #8696a0; align-self: center; font-size: 11px; border-radius: 8px; padding: 4px 10px; }
    .input-area { background: #202c33; padding: 10px 12px; display: flex; gap: 8px; align-items: center; }
    input { flex: 1; background: #2a3942; border: none; border-radius: 20px; padding: 10px 16px; color: #e9edef; font-size: 14px; outline: none; }
    input::placeholder { color: #8696a0; }
    button.send { width: 40px; height: 40px; background: #00a884; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    button.send:hover { background: #00c49a; }
    .typing { color: #8696a0; font-size: 11px; padding: 2px 12px; min-height: 16px; }
  </style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="avatar">🍕</div>
    <div class="info">
      <h3>Java Joe's</h3>
      <p id="status">Bot de Atendimento</p>
    </div>
    <button class="reset-btn" onclick="resetar()">↺ Resetar</button>
  </div>
  <div class="messages" id="msgs"></div>
  <div class="typing" id="typing"></div>
  <div class="input-area">
    <input id="inp" placeholder="Mensagem" onkeydown="if(event.key==='Enter') enviar()" />
    <button class="send" onclick="enviar()">➤</button>
  </div>
</div>

<script>
  const phone = '5521999999999'; // número de teste fixo
  const BOT_URL = 'http://localhost:3000/webhook';

  async function enviar() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    addMsg(text, 'user');
    document.getElementById('typing').textContent = 'digitando...';

    try {
      const resp = await fetch(BOT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, message: { text: { message: text } } })
      });
      // Bot responde via Z-API, mas localmente interceptamos via polling
      await new Promise(r => setTimeout(r, 2500)); // aguarda debounce do bot
      checkResposta();
    } catch(e) {
      addMsg('Erro ao conectar no bot local', 'system');
    }
    document.getElementById('typing').textContent = '';
  }

  let ultimaResposta = '';
  async function checkResposta() {
    try {
      const r = await fetch('http://localhost:3000/ultima-resposta/' + phone);
      const data = await r.json();
      if (data.msg && data.msg !== ultimaResposta) {
        ultimaResposta = data.msg;
        addMsg(data.msg, 'bot');
      }
    } catch(e) {}
  }

  function addMsg(text, tipo) {
    const div = document.createElement('div');
    div.className = 'msg ' + tipo;
    div.textContent = text;
    const msgs = document.getElementById('msgs');
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function resetar() {
    fetch('http://localhost:3000/reset-test/' + phone, { method: 'POST' });
    document.getElementById('msgs').innerHTML = '';
    ultimaResposta = '';
    addMsg('Conversa reiniciada', 'system');
  }

  // Inicia
  addMsg('Mande uma mensagem para testar o bot!', 'system');
</script>
</body>
</html>
