<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Slide 6</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px;
      background: linear-gradient(135deg, #0d1117 0%, #141e14 100%);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 52px;
      overflow: hidden;
    }

    h2 {
      color: #fff;
      font-size: 52px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
    }
    h2 span { color: #25D366; }

    .list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 24px;
      color: #ddd;
      font-size: 30px;
    }

    .icon-box {
      width: 64px;
      height: 64px;
      background: rgba(37,211,102,0.12);
      border: 1px solid rgba(37,211,102,0.25);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <h2>O que você <span>recebe</span> 📦</h2>

  <div class="list">
    <div class="row">
      <div class="icon-box">🔧</div>
      Bot personalizado para o seu negócio
    </div>
    <div class="row">
      <div class="icon-box">💬</div>
      Respostas automáticas para perguntas frequentes
    </div>
    <div class="row">
      <div class="icon-box">📅</div>
      Sistema de agendamento integrado
    </div>
    <div class="row">
      <div class="icon-box">📊</div>
      Painel para ver e gerenciar os atendimentos
    </div>
    <div class="row">
      <div class="icon-box">🔄</div>
      Ajustes conforme você precisar
    </div>
  </div>

</body>
</html>
