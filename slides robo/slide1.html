<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Slide 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px;
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .photo-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .photo-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      opacity: 1;
    }
    .photo-area .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%);
    }
    .photo-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #444;
      font-size: 22px;
      border: 3px dashed #2a2a2a;
    }
    .photo-placeholder .icon { font-size: 64px; }

    .tag {
      position: absolute;
      top: 36px;
      left: 36px;
      background: #25D366;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      padding: 8px 22px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      z-index: 2;
    }

    .bottom {
      padding: 40px 60px 48px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #0a0a0a;
    }
    h1 {
      color: #fff;
      font-size: 44px;
      font-weight: 800;
      line-height: 1.2;
    }
    h1 span { color: #25D366; }
    .sub {
      color: #ccc;
      font-size: 27px;
      line-height: 1.4;
    }
    .sub strong { color: #fff; }
    .swipe {
      color: #25D366;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="photo-area">
    <img src="print1.png" />
    <div class="overlay"></div>
    <div class="tag">🕓 03:36 da manhã</div>
  </div>

  <div class="bottom">
    <h1>Criei um robô que <span>atende seus clientes</span> no WhatsApp por você 🤖</h1>
    <div class="sub">Esse print foi tirado às <strong>3h36 da manhã</strong>. O bot já respondeu. O dono estava dormindo.</div>
    <div class="swipe">Arrasta pra ver como funciona →</div>
  </div>

</body>
</html>
