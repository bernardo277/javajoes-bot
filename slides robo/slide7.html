<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Slide 7</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px;
      background: linear-gradient(160deg, #0a2a12 0%, #051008 100%);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 36px;
      overflow: hidden;
      text-align: center;
    }

    .avatar {
      width: 140px;
      height: 140px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
    }
    /* Se quiser usar sua foto: */
    /* .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; } */

    h2 {
      color: #fff;
      font-size: 54px;
      font-weight: 800;
      line-height: 1.2;
    }
    h2 span { color: #25D366; }

    p {
      color: #aaa;
      font-size: 30px;
      line-height: 1.6;
    }

    .cta {
      background: #25D366;
      color: #fff;
      font-size: 32px;
      font-weight: 700;
      padding: 24px 60px;
      border-radius: 999px;
      margin-top: 8px;
    }

    .note {
      color: #3a6e45;
      font-size: 24px;
    }
  </style>
</head>
<body>

  <div class="avatar">
    🤖
    <!-- Para usar sua foto: <img src="sua-foto.jpg" /> -->
  </div>

  <h2>Quer um <span>personalizado</span><br>para o seu negócio? 🤖</h2>

  <p>Entre em contato e a gente monta um bot<br>do zero, do jeito que o seu negócio precisa.</p>

  <div class="cta">✉️ Entre em contato agora</div>

  <p class="note">Primeiras vagas com condição especial</p>

</body>
</html>
