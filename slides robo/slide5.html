<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Slide 5</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px;
      background: linear-gradient(135deg, #0d1117 0%, #141e14 100%);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 52px;
      overflow: hidden;
    }

    h2 {
      color: #fff;
      font-size: 52px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
    }
    h2 span { color: #25D366; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      width: 100%;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(37,211,102,0.2);
      border-radius: 20px;
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card .emoji { font-size: 44px; }
    .card p {
      color: #ccc;
      font-size: 26px;
      font-weight: 600;
      line-height: 1.3;
    }
  </style>
</head>
<body>

  <h2>Funciona para qualquer<br><span>negócio local</span> 🏪</h2>

  <div class="grid">
    <div class="card">
      <div class="emoji">🍽️</div>
      <p>Restaurantes e bares</p>
    </div>
    <div class="card">
      <div class="emoji">✂️</div>
      <p>Salões e barbearias</p>
    </div>
    <div class="card">
      <div class="emoji">🏥</div>
      <p>Clínicas e consultórios</p>
    </div>
    <div class="card">
      <div class="emoji">🛍️</div>
      <p>Lojas e ateliês</p>
    </div>
    <div class="card">
      <div class="emoji">🏋️</div>
      <p>Academias e estúdios</p>
    </div>
    <div class="card">
      <div class="emoji">📱</div>
      <p>Qualquer negócio com WhatsApp</p>
    </div>
  </div>

</body>
</html>
