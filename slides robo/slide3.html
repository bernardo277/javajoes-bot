<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Slide 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px;
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .photo-area {
      height: 560px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .photo-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      opacity: 1;
    }
    .photo-area .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
    }
    .photo-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #444;
      font-size: 22px;
      border: 3px dashed #2a2a2a;
    }
    .photo-placeholder .icon { font-size: 64px; }

    .content {
      flex: 1;
      padding: 36px 60px 44px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    h2 {
      color: #fff;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.2;
    }
    h2 span { color: #25D366; }

    .checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .check {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ddd;
      font-size: 28px;
      font-weight: 500;
    }
    .check::before {
      content: "✅";
      font-size: 26px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="photo-area">
    <img src="print3.png" />
    <div class="overlay"></div>
  </div>

  <div class="content">
    <h2>E se seu WhatsApp <span>respondesse sozinho?</span> 🤖</h2>
    <div class="checks">
      <div class="check">Responde perguntas</div>
      <div class="check">Informa cardápio</div>
      <div class="check">Faz reservas</div>
      <div class="check">Funciona 24h</div>
      <div class="check">Checa disponibilidade</div>
      <div class="check">Chama atendente</div>
    </div>
  </div>

</body>
</html>
